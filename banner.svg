<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060810"/>
      <stop offset="50%" style="stop-color:#080c18"/>
      <stop offset="100%" style="stop-color:#04060e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f6ff"/>
      <stop offset="60%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orbGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="centerGlow" cx="38%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#060810;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="rightOrb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="rightClip">
      <rect x="680" y="0" width="520" height="320"/>
    </clipPath>
    <pattern id="hexPat" x="0" y="0" width="40" height="46" patternUnits="userSpaceOnUse">
      <polygon points="20,2 38,12 38,34 20,44 2,34 2,12" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.07"/>
    </pattern>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="0.8" cy="0.8" r="0.7" fill="#7c9cbf" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#hexPat)"/>
  <rect width="1200" height="320" fill="url(#dotGrid)"/>

  <!-- Ambient Glows -->
  <ellipse cx="380" cy="160" rx="320" ry="200" fill="url(#centerGlow)"/>
  <ellipse cx="950" cy="160" rx="240" ry="180" fill="url(#rightOrb)"/>
  <circle cx="90" cy="60" r="40" fill="#3b82f6" opacity="0.05" filter="url(#orbGlow)"/>
  <circle cx="1130" cy="260" r="50" fill="#818cf8" opacity="0.06" filter="url(#orbGlow)"/>
  <circle cx="600" cy="290" r="30" fill="#38bdf8" opacity="0.06" filter="url(#orbGlow)"/>

  <!-- Decorative Geometry Left -->
  <circle cx="68" cy="160" r="90" fill="none" stroke="#38bdf8" stroke-width="0.6" opacity="0.2"/>
  <circle cx="68" cy="160" r="70" fill="none" stroke="#818cf8" stroke-width="0.4" opacity="0.15"/>
  <line x1="0" y1="0" x2="120" y2="120" stroke="#3b82f6" stroke-width="0.4" opacity="0.12"/>
  <line x1="20" y1="0" x2="140" y2="120" stroke="#3b82f6" stroke-width="0.4" opacity="0.08"/>
  <line x1="40" y1="0" x2="160" y2="120" stroke="#3b82f6" stroke-width="0.4" opacity="0.05"/>
  <line x1="46" y1="150" x2="90" y2="150" stroke="#38bdf8" stroke-width="0.7" opacity="0.5" filter="url(#blueGlow)"/>
  <line x1="68" y1="128" x2="68" y2="172" stroke="#38bdf8" stroke-width="0.7" opacity="0.5" filter="url(#blueGlow)"/>
  <circle cx="68" cy="150" r="3" fill="#38bdf8" opacity="0.8" filter="url(#blueGlow)"/>

  <!-- Vertical Accent Bar -->
  <rect x="148" y="78" width="2.5" height="164" fill="url(#accentGrad)" rx="1.5" filter="url(#blueGlow)"/>

  <!-- Left Text Content -->
  <!-- Badge -->
