  <text x="314" y="231" font-family="monospace" font-size="10" fill="#86efac" text-anchor="middle" letter-spacing="0.5">Node.js</text>

  <rect x="346" y="218" width="52" height="19" rx="9.5" fill="#0f172a" stroke="#06b6d4" stroke-width="0.6"/>
