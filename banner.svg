    <g font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="12.5">
      <text x="740" y="96">
        <tspan fill="#818cf8">const </tspan><tspan fill="#e2e8f0">engineer</tspan><tspan fill="#64748b"> = {</tspan>
      </text>
      <text x="740" y="116">
        <tspan fill="#64748b">  name:    </tspan><tspan fill="#86efac">"Aman Kumar Karn"</tspan><tspan fill="#64748b">,</tspan>
      </text>
      <text x="740" y="136">
        <tspan fill="#64748b">  role:    </tspan><tspan fill="#86efac">"Full Stack Dev"</tspan><tspan fill="#64748b">,</tspan>
      </text>
      <text x="740" y="156">
        <tspan fill="#64748b">  stack:   </tspan><tspan fill="#7dd3fc">["TS"</tspan><tspan fill="#64748b">, </tspan><tspan fill="#7dd3fc">"React"</tspan><tspan fill="#64748b">, </tspan><tspan fill="#7dd3fc">"Docker"</tspan><tspan fill="#64748b">],</tspan>
      </text>
      <text x="740" y="176">
        <tspan fill="#64748b">  ui:      </tspan><tspan fill="#67e8f9">"Tailwind CSS"</tspan><tspan fill="#64748b">,</tspan>
      </text>
      <text x="740" y="196">
        <tspan fill="#64748b">  open:    </tspan><tspan fill="#f97316">true</tspan><tspan fill="#64748b">,</tspan>
      </text>
      <text x="740" y="216">
        <tspan fill="#64748b">  coffee:  </tspan><tspan fill="#f97316">Infinity</tspan><tspan fill="#64748b">,</tspan>
      </text>
      <text x="740" y="236">
        <tspan fill="#64748b">};</tspan>
      </text>
      <rect x="755" y="248" width="8" height="14" fill="#38bdf8" opacity="0.75" rx="1"/>
    </g>

    <!-- Status bar -->
    <rect x="690" y="256" width="468" height="24" rx="0" fill="#060d1a"/>
    <rect x="690" y="268" width="468" height="12" rx="0" fill="#060d1a"/>
    <rect x="1148" y="256" width="10" height="24" rx="0" fill="#060d1a"/>
    <text x="706" y="271" font-family="monospace" font-size="10" fill="#1e4976">TypeScript  ·  UTF-8  ·  profile.ts</text>
    <circle cx="1130" cy="268" r="3.5" fill="#4ade80" opacity="0.8"/>
    <text x="1140" y="272" font-family="monospace" font-size="10" fill="#4ade80">ready</text>
  </g>

  <!-- Decorative Geometry Right -->
  <line x1="1100" y1="0" x2="1200" y2="100" stroke="#818cf8" stroke-width="0.5" opacity="0.15"/>
  <line x1="1140" y1="0" x2="1200" y2="60" stroke="#818cf8" stroke-width="0.5" opacity="0.1"/>
  <circle cx="1160" cy="30" r="2" fill="#818cf8" opacity="0.5"/>
  <circle cx="1185" cy="55" r="1.5" fill="#38bdf8" opacity="0.4"/>
  <path d="M 1200 240 A 70 70 0 0 0 1130 320" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <path d="M 1200 200 A 110 110 0 0 0 1090 320" fill="none" stroke="#6366f1" stroke-width="0.4" opacity="0.12"/>



  <!-- Floating particles -->
  <circle cx="520" cy="45" r="1.5" fill="#38bdf8" opacity="0.6"/>
  <circle cx="555" cy="80" r="1" fill="#818cf8" opacity="0.5"/>
  <circle cx="480" cy="270" r="1.8" fill="#38bdf8" opacity="0.4"/>
  <circle cx="540" cy="250" r="1" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="430" cy="55" r="1.2" fill="#7dd3fc" opacity="0.4"/>
