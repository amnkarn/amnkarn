  <text x="174" y="270" font-family="monospace" font-size="11" fill="#475569" letter-spacing="0.5">◈  linkedin.com/in/amnkarn</text>
  <text x="174" y="290" font-family="monospace" font-size="11" fill="#475569" letter-spacing="0.5">◈  x.com/amnkarn</text>

