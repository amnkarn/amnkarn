  <text x="261" y="103" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="10.5" fill="#38bdf8" text-anchor="middle" letter-spacing="2.5" opacity="0.9">FULL STACK DEVELOPER</text>

  <!-- Name -->
  <text x="172" y="168" font-family="Georgia,'Palatino',serif" font-size="42" font-weight="700" fill="url(#nameGrad)" letter-spacing="-1.5">Aman Kumar Karn</text>

