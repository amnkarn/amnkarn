    <rect x="690" y="38" width="468" height="242" rx="10" fill="#080e1c" stroke="#1e293b" stroke-width="1"/>
    <rect x="690" y="38" width="468" height="36" rx="10" fill="#0d1526"/>
    <rect x="690" y="55" width="468" height="19" fill="#0d1526"/>
    <circle cx="714" cy="56" r="5.5" fill="#ff5f57" opacity="0.9"/>
    <circle cx="732" cy="56" r="5.5" fill="#febc2e" opacity="0.9"/>
